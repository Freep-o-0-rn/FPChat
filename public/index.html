<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>FPChat</title>

  <meta name="theme-color" content="#7b2cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FPChat" />

  <link rel="icon" href="/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
  <link rel="manifest" href="/manifest.webmanifest" />
    <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #0e1621;
    }

    .hidden-boot {
      display: none !important;
    }

    #bootSplash {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(123,44,255,.24), transparent 36%),
        #0e1621;
      color: #e7edf4;
      font-family: Segoe UI, Arial, sans-serif;
      padding: 24px;
    }

    .boot-card {
      width: min(360px, 100%);
      text-align: center;
      padding: 24px;
      border-radius: 22px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 18px 45px rgba(0,0,0,.22);
    }

    .boot-logo {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .boot-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .boot-text {
      color: #95a3b3;
      font-size: 14px;
    }

    .boot-progress {
      position: relative;
      height: 8px;
      margin-top: 18px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
    }

    .boot-progress-bar {
      position: absolute;
      top: 0;
      left: -45%;
      height: 100%;
      width: 45%;
      border-radius: inherit;
      background: linear-gradient(90deg, transparent, #7b2cff, #39d98a, transparent);
      animation: boot-progress 1.15s ease-in-out infinite;
    }

    @keyframes boot-progress {
      0% { left: -45%; }
      100% { left: 100%; }
    }
  </style>
</head>
<body>
  <div id="bootSplash">
    <div class="boot-card">
      <div class="boot-logo">FPChat</div>
      <div id="bootTitle" class="boot-title">Загрузка FPChat...</div>
      <div id="bootText" class="boot-text">Подготавливаем приложение</div>
      <div class="boot-progress">
        <div class="boot-progress-bar"></div>
      </div>
    </div>
  </div>

  <div class="app hidden-boot" id="appRoot">
    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true"></div>
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-close mobile-only" id="sidebarCloseBtn" aria-label="Закрыть меню">×</button>
      <button class="nav-btn active" data-view="chats"><span>💬</span><small>Чаты</small></button>
      <button class="nav-btn" data-view="create"><span>➕</span><small>Создать</small></button>
      <button class="nav-btn" data-view="join"><span>🔗</span><small>Присоединиться</small></button>
      <button class="nav-btn" data-view="restore"><span>🔑</span><small>Восстановить</small></button>
      <button class="nav-btn" data-view="settings"><span>⚙</span><small>Настройки</small></button>
    </aside>

    <section class="chat-list" id="chatListPane">
      <div class="chat-list-top">
        <button id="mobileMenuBtn" class="mobile-only btn btn-icon">☰</button>
        <input id="chatSearch" placeholder="Поиск" />
      </div>

      <div id="emptyChats" class="empty-state">
        <div class="empty-state-card">
          <h3>У вас пока нет чатов</h3>
          <p>Создайте новый чат, подключитесь по invite-ссылке или восстановите доступ по recovery-коду.</p>
          <div class="empty-state-actions">
            <button id="emptyCreateBtn" class="btn btn-primary">Создать чат</button>
            <button id="emptyJoinBtn" class="btn btn-secondary">Присоединиться по ссылке</button>
            <button id="emptyRestoreBtn" class="btn btn-secondary">Восстановить по коду</button>
          </div>
        </div>
      </div>

      <div id="chatRows"></div>
    </section>

    <main class="content" id="contentPane"></main>
  </div>

  <div id="contextMenu" class="context-menu hidden"></div>

  <script>
    (async () => {
      let buildSuffix = '';
      try {
        const res = await fetch('/version.json', { cache: 'no-store' });
        if (res.ok) {
          const data = await res.json();
          const buildNumber = Number(data?.build);
          if (Number.isFinite(buildNumber)) {
            buildSuffix = `?v=${buildNumber}`;
          }
        }
      } catch {}

      const css = document.createElement('link');
      css.rel = 'stylesheet';
      css.href = `/styles.css${buildSuffix}`;
      document.head.appendChild(css);

      const script = document.createElement('script');
      script.src = `/app.js${buildSuffix}`;
      script.defer = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
